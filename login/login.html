<div id="login-view" class="hidden">
    <div class="login-icon"><img src="../icons/icon.svg" alt="ATA"></div>
    <p class="login-subtitle">校園服務一鍵登入</p>

    <div class="input-group">
        <label>Portal 學號</label>
        <input type="text" id="username" name="username" placeholder="請輸入學號" autocomplete="username">
    </div>

    <div class="input-group">
        <label>Portal 密碼</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button type="submit" id="save-btn">儲存並進入系統</button>
    <div id="status"></div>
</div>
