name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # The manual button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Chrome ZIP
        run: |
          zip -r chrome.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "docs/*" \
            -x "scripts/*" \
            -x "_metadata/*" \
            -x "manifest.firefox.json" \
            -x "build.sh" \
            -x "README.md" \
            -x ".gitignore"

      - name: Build Firefox ZIP
        run: |
          cp manifest.firefox.json manifest.json
          zip -r firefox.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "docs/*" \
            -x "scripts/*" \
            -x "_metadata/*" \
            -x "build.sh" \
            -x "README.md" \
            -x ".gitignore"

      - name: Generate Tag Name
        id: tagger
        run: |
          # If triggered by a tag, use it. Otherwise, create a timestamp tag.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chrome.zip
            firefox.zip
          tag_name: ${{ steps.tagger.outputs.tag }}
          name: Release ${{ steps.tagger.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
