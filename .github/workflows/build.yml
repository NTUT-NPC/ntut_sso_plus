name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with v (e.g., v1.0.1)
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CRX utility
        run: npm install -g crx

      - name: Build Extension (CRX and ZIP)
        run: |
          # Create ZIP (from root, excluding git/github folders)
          zip -r extension.zip . -x "*.git*" ".github*"
          
          # Create CRX using your secret key
          echo "${{ secrets.CHROME_PRIVATE_KEY }}" > private.pem
          crx pack . -p private.pem -o extension.crx
          rm private.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension.zip
            extension.crx
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
