name: Build and Release CRX

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CRX utility
        run: npm install -g crx

      - name: Build CRX
        run: |
          # Generate the CRX using your secret key
          echo "${{ secrets.CHROME_PRIVATE_KEY }}" > private.pem
          crx pack . -p private.pem -o extension.crx
          rm private.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Only include the CRX file here
          files: extension.crx
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
