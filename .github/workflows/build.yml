name: Build Chrome Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CRX utility
        run: npm install -g crx

      - name: Build Extension (CRX and ZIP)
        run: |
          # 1. Create the ZIP (from root)
          zip -r extension.zip . -x "*.git*" ".github*"
          
          # 2. Create the CRX
          # Note: This assumes you've added your .pem key to GitHub Secrets
          echo "${{ secrets.CHROME_PRIVATE_KEY }}" > private.pem
          crx pack . -p private.pem -o extension.crx
          rm private.pem
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-files
          path: |
            extension.zip
            extension.crx
