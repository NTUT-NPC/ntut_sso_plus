name: Update Version
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number (e.g., 26.3.23). Leave empty to use current date and incremental patch.'
        required: false
        default: ''

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Calculate New Version
        id: calc_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
          else
            # Get current date info
            YEAR=$(date +'%y')
            MONTH=$(date +'%m' | sed 's/^0//')
            
            # Get current version info
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            CUR_YEAR=$(echo $CURRENT_VERSION | cut -d. -f1)
            CUR_MONTH=$(echo $CURRENT_VERSION | cut -d. -f2)
            CUR_PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
            
            if [ "$YEAR" == "$CUR_YEAR" ] && [ "$MONTH" == "$CUR_MONTH" ]; then
              NEW_PATCH=$((CUR_PATCH + 1))
            else
              NEW_PATCH=1
            fi
            NEW_VERSION="$YEAR.$MONTH.$NEW_PATCH"
          fi
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Target Version: $NEW_VERSION"

      - name: Update Files
        run: |
          npm version ${{ steps.calc_version.outputs.NEW_VERSION }} --no-git-tag-version
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump version to ${{ steps.calc_version.outputs.NEW_VERSION }}"
          branch: "bump-version-${{ steps.calc_version.outputs.NEW_VERSION }}"
          title: "chore: bump version to ${{ steps.calc_version.outputs.NEW_VERSION }}"
          body: |
            This PR updates the project version to `${{ steps.calc_version.outputs.NEW_VERSION }}`.
            
            Manual Version: ${{ github.event.inputs.version || 'Auto-calculated' }}
          base: main
          delete-branch: true
