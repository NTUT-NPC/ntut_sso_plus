name: Update Version
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # 從 PR 分支檢出程式碼
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      # 設置 Node.js 環境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 獲取年份和 PR 編號
      - name: Extract Version Info
        id: version_info
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          YEAR=$(date +'%y') # 使用兩位數年份
          VERSION="${YEAR}.${PR_NUMBER}.0"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Target Version: $VERSION"

      # 更新 package.json 的版本號
      - name: Update Files
        run: |
          npm version "${{ steps.version_info.outputs.VERSION }}" --no-git-tag-version

      # 提交變更
      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version_info.outputs.VERSION }}"
          git push origin ${{ github.head_ref }}

      # 在 PR 上留言，例如 "Tagged version 2026.64.0"
      - name: Leave Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          YEAR=$(date +'%Y')
          COMMENT_BODY="Tagged version ${YEAR}.${PR_NUMBER}.0"
          gh pr comment $PR_NUMBER --body "$COMMENT_BODY"
