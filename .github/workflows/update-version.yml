name: Update Version
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # 檢出 PR 的來源分支
      - uses: actions/checkout@v4

      # 設置 Node.js 環境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 獲取 PR 編號並生成版本號
      - name: Extract PR Number
        id: extract_pr_number
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Target Version: v$PR_NUMBER"

      # 更新 package.json 的版本號
      - name: Update Files
        run: |
          PR_NUMBER=${{ steps.extract_pr_number.outputs.PR_NUMBER }}
          # 將 PR 號碼作為版本號設置（不包含 "v"）
          npm version "$PR_NUMBER" --no-git-tag-version

      # 提交變更
      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${{ steps.extract_pr_number.outputs.PR_NUMBER }}"
          git push origin ${{ github.head_ref }}

      # 在 PR 上留言，例如 "Tagged version v56"
      - name: Leave Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          COMMENT_BODY="Tagged version v${{ steps.extract_pr_number.outputs.PR_NUMBER }}"
          gh pr comment $PR_NUMBER --body "$COMMENT_BODY"