name: Build on Merge
on:
  pull_request:
    types:
      - closed # 在 PR 被關閉時觸發（包括合併的情況）
  workflow_dispatch: # 添加手動觸發支持

jobs:
  build-on-merge:
    # 確保僅在 PR 合併後（或手動觸發時）執行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 檢出分支代碼
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }} # 用於區分自動和手動模式

      # 2. 設置 Node.js 環境
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. 安裝依賴
      - name: Install Dependencies
        run: npm install

      # 4. 編譯代碼
      - name: Build Project
        run: npm run build

      # 5. 執行測試（可選）
      - name: Run Tests
        if: success() # 僅在之前的步驟成功時執行
        run: npm test

      # 6. (可選) 上傳構建工件
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: dist/

      # 7. 捕獲錯誤日誌（僅在失敗時執行）
      - name: Debug on Failure
        if: failure()
        run: |
          echo "[DEBUG] Build failed. Capturing logs:"
          dmesg
          cat /var/log/syslog