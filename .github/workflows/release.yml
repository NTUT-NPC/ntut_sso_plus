name: Build on Merge
on:
  pull_request:
    types:
      - closed # Triggered when a PR is closed (including being merged)
  workflow_dispatch: # Adds manual trigger support

jobs:
  build-on-merge:
    # Ensure the workflow only runs after a PR is merged (or manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout branch code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }} # Distinguish between automatic and manual modes

      # 2. Setup Node.js environment
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Build project
      - name: Build Project
        run: npm run build

      # 5. Run tests (optional)
      - name: Run Tests
        if: success() # Run only if the previous steps succeeded
        run: npm test

      # 6. Upload build artifacts (updated to v4)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      # 7. Capture debug logs on failure (optional)
      - name: Debug on Failure
        if: failure()
        run: |
          echo "[DEBUG] Build failed. Capturing logs:"
          dmesg
          cat /var/log/syslog
