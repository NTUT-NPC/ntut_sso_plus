name: Extension Build & Validation

on:
  pull_request:
  workflow_dispatch: # The manual button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CRX utility
        run: npm install -g crx

      - name: Check import
        run: node scripts/check-imports.js

      - name: Build CRX
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "${{ secrets.CHROME_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.CHROME_PRIVATE_KEY }}" > private.pem
            crx pack . -p private.pem -o extension.crx
            rm private.pem
          else
            echo "Skipping signing as CHROME_PRIVATE_KEY is not available."
            # Optional: Pack without signing if crx supports it, 
            # or just skip if it's only for PR validation.
          fi
